name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          fmtdiff="$(gofmt -l .)"
          if [ -n "$fmtdiff" ]; then
            echo "gofmt needs to be run on:"
            echo "$fmtdiff"
            exit 1
          fi

      - name: Test
        run: go test ./...
